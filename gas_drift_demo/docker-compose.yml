services:
  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway_drift
    ports:
      - "9092:9091"   # HOST:CONTAINER

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_drift
    ports:
      - "9093:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - pushgateway

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_drift
    ports:
      - "3001:3000"
    depends_on:
      - prometheus